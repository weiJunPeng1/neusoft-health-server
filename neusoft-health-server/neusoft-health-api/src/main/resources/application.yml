spring:
  application:
    name: neusoft-health
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:neusoft_health}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:sa123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      timeout: 5000ms

server:
  port: 8080
  address: 0.0.0.0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.neusoft.health.modules.*.entity
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:NEUSOFT_HEALTH_CONSULTING_JWT_SECRET_KEY_2026}
  expiration: ${JWT_EXPIRATION:604800000}
  refresh-expiration: 2592000000

sms:
  url: https://push.spug.cc/sms/4ggpmeq2TLOLJvaF4-t24A
  time: 1
  min-interval-seconds: 60
  daily-max-count: 5
  queryUrl: https://push.spug.cc/request/query
  Token: dca9d3db892e4e7bab8ca264b117d812

ai:
  provider: ${AI_PROVIDER:deepseek}
  api-key: ${AI_API_KEY:${DEEPSEEK_API_KEY:}}
  api-url: ${AI_API_URL:${DEEPSEEK_API_URL:https://api.deepseek.com}}
  model: ${AI_MODEL:${DEEPSEEK_MODEL:deepseek-chat}}
  max-tokens: ${AI_MAX_TOKENS:2048}
  temperature: ${AI_TEMPERATURE:0.7}
  chat-endpoint: ${AI_CHAT_ENDPOINT:}
  responses-endpoint: ${AI_RESPONSES_ENDPOINT:}

tts:
  provider: doubao
  api-key: ${TTS_API_KEY:}
  app-id: ${TTS_APP_ID:7780058388}
  access-token: ${TTS_ACCESS_TOKEN:PRSWYid17xCY1Y34GJOaEAjvQGztYQrs}
  secret-key: ${TTS_SECRET_KEY:pn1Cp4uHmMKv4Ftk4jXf009ZkFXJD6ZN}
  resource-id: ${TTS_RESOURCE_ID:seed-tts-2.0}
  speaker: ${TTS_SPEAKER:zh_female_vv_mars_bigtts}
  speed: ${TTS_SPEED:0}
  volume: ${TTS_VOLUME:0}
  format: ${TTS_FORMAT:mp3}
  sample-rate: ${TTS_SAMPLE_RATE:24000}

alipay:
  app-id: ${ALIPAY_APP_ID:2088842396964540}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway: ${ALIPAY_GATEWAY:https://openapi.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/v1/payment/notify/alipay}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:8080/pages/payment/result}

logging:
  level:
    com.neusoft.health: debug
    org.springframework.security: warn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
