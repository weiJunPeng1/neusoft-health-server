<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>东软智慧健康 · 数据运营中心</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes borderFlow { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }
    @keyframes dotPulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); } 70% { box-shadow: 0 0 0 8px rgba(0,255,136,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); } }
    @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

    :root {
      --bg: #030b1a;
      --card: rgba(6, 30, 65, 0.65);
      --border: rgba(0, 145, 255, 0.2);
      --pri: #00d4ff;
      --ok: #00ff88;
      --warn: #ffb400;
      --danger: #ff4d5a;
      --txt: #e0ecff;
      --sub: rgba(180, 210, 255, 0.6);
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--txt);
    }

    .wrap {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(0,80,200,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(0,100,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,100,255,0.06) 0%, transparent 50%),
        linear-gradient(180deg, #030b1a 0%, #061328 50%, #030b1a 100%);
      position: relative;
    }

    .wrap::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,145,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,145,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hd {
      height: 7vh; min-height: 50px; max-height: 80px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 10;
      animation: fadeIn 0.6s ease-out;
    }

    .hd-bg {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,80,200,0.25) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .hd-bg::before {
      content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
      width: 30vw; height: 2px;
      background: var(--pri);
      box-shadow: 0 0 20px var(--pri), 0 0 60px rgba(0,212,255,0.3);
    }

    .hd-bg::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--pri) 50%, var(--border) 80%, transparent 100%);
    }

    .hd-deco {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 15vw; height: 30px; opacity: 0.4;
    }
    .hd-deco.l { left: 2vw; }
    .hd-deco.r { right: 2vw; transform: translateY(-50%) scaleX(-1); }

    .hd-title {
      font-size: clamp(18px, 2vw, 32px); font-weight: 700; letter-spacing: 0.5vw;
      background: linear-gradient(90deg, #a0d8ff, #fff, #00d4ff, #fff, #a0d8ff);
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: borderFlow 6s linear infinite;
      position: relative; z-index: 1;
    }

    .hd-left, .hd-right {
      position: absolute; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center; gap: 1.5vw; z-index: 1;
    }
    .hd-left { left: 2vw; }
    .hd-right { right: 2vw; }

    .hd-info { font-size: clamp(11px, 0.8vw, 14px); color: var(--sub); }
    .hd-time { font-size: clamp(14px, 1.2vw, 22px); font-family: 'Courier New', monospace; color: var(--pri); letter-spacing: 2px; }

    .hd-btn {
      padding: 0.3vh 1vw; background: rgba(0,212,255,0.1);
      border: 1px solid var(--border); color: var(--pri);
      border-radius: 4px; cursor: pointer; font-size: clamp(11px, 0.75vw, 14px);
      transition: all 0.3s;
    }
    .hd-btn:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 15px rgba(0,212,255,0.3); }

    .main {
      flex: 1; display: grid;
      grid-template-columns: minmax(300px, 25vw) 1fr minmax(300px, 25vw);
      grid-template-rows: auto 1fr;
      gap: 1vh; padding: 1vh 1vw;
      position: relative; z-index: 1;
      min-height: 0;
    }

    .kpi {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1vw;
    }

    .kpi-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 1.2vh 1.2vw; position: relative; overflow: hidden;
      cursor: pointer; transition: all 0.3s;
      animation: slideUp 0.5s ease-out backwards;
    }
    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.2s; }
    .kpi-card:nth-child(5) { animation-delay: 0.25s; }
    .kpi-card:nth-child(6) { animation-delay: 0.3s; }

    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--pri), transparent);
    }

    .kpi-card:hover {
      border-color: rgba(0,212,255,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,212,255,0.15);
    }

    .kpi-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8vh; }

    .kpi-label {
      font-size: clamp(11px, 0.75vw, 14px); color: var(--sub);
      display: flex; align-items: center; gap: 0.4vw;
    }
    .kpi-label svg { flex-shrink: 0; }

    .kpi-badge {
      font-size: clamp(10px, 0.65vw, 12px); padding: 0.15vh 0.5vw;
      border-radius: 10px; font-weight: 500;
    }
    .kpi-badge.up { color: var(--ok); background: rgba(0,255,136,0.1); }
    .kpi-badge.down { color: var(--danger); background: rgba(255,77,90,0.1); }

    .kpi-val {
      font-size: clamp(20px, 1.8vw, 32px); font-weight: 700;
      color: #fff; font-family: 'Courier New', monospace; letter-spacing: 1px;
    }

    .kpi-desc { font-size: clamp(10px, 0.65vw, 12px); color: var(--sub); margin-top: 0.4vh; }

    .pnl {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 1.2vh 1.2vw; position: relative; overflow: hidden;
      display: flex; flex-direction: column; min-height: 0;
    }

    .pnl::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--pri) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: borderFlow 3s linear infinite;
    }

    .pnl-corner { position: absolute; width: 12px; height: 12px; pointer-events: none; }
    .pnl-corner.tl { top: -1px; left: -1px; border-top: 2px solid var(--pri); border-left: 2px solid var(--pri); }
    .pnl-corner.tr { top: -1px; right: -1px; border-top: 2px solid var(--pri); border-right: 2px solid var(--pri); }
    .pnl-corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--pri); border-left: 2px solid var(--pri); }
    .pnl-corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--pri); border-right: 2px solid var(--pri); }

    .pnl-tt {
      font-size: clamp(12px, 0.85vw, 16px); font-weight: 600;
      padding-left: 0.8vw; border-left: 3px solid var(--pri);
      margin-bottom: 1vh; display: flex; align-items: center; gap: 0.5vw;
      flex-shrink: 0;
    }
    .pnl-tt svg { flex-shrink: 0; }
    .pnl-tt::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); margin-left: 0.8vw; }

    .cbox { flex: 1; min-height: 0; }

    .col-l, .col-r { display: flex; flex-direction: column; gap: 1vh; min-height: 0; }
    .col-c { display: flex; flex-direction: column; gap: 1vh; min-height: 0; }
    .col-c .pnl-map { flex: 1.4; }
    .col-c .pnl-bot { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1vw; }

    .pnl-live { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    .live-hd {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.8vh; flex-shrink: 0;
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--ok); border-radius: 50%;
      display: inline-block; margin-right: 0.3vw;
      animation: dotPulse 2s ease-out infinite;
    }
    .live-cnt { font-size: clamp(11px, 0.7vw, 13px); color: var(--ok); }

    .live-wrap { flex: 1; overflow: hidden; min-height: 0; }
    .live-scroll { animation: scrollUp 30s linear infinite; }
    .live-scroll:hover { animation-play-state: paused; }

    .live-item {
      display: flex; align-items: center;
      padding: 0.6vh 0.4vw; border-bottom: 1px solid rgba(0,145,255,0.08);
      border-radius: 4px; transition: all 0.25s;
    }
    .live-item:hover { background: rgba(0,212,255,0.08); padding-left: 0.8vw; }

    .live-av {
      width: clamp(24px, 2vw, 36px); aspect-ratio: 1; border-radius: 50%;
      background: linear-gradient(135deg, var(--pri), #0066cc);
      display: flex; align-items: center; justify-content: center;
      margin-right: 0.6vw; font-size: clamp(11px, 0.7vw, 14px); font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .live-info { flex: 1; min-width: 0; }
    .live-name { font-size: clamp(11px, 0.7vw, 13px); margin-bottom: 0.1vh; }
    .live-msg { font-size: clamp(10px, 0.65vw, 12px); color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .live-time { font-size: clamp(9px, 0.6vw, 11px); color: var(--sub); margin-left: 0.5vw; flex-shrink: 0; }

    .rank-list { list-style: none; overflow-y: auto; flex: 1; min-height: 0; }

    .rank-item {
      display: flex; align-items: center;
      padding: 0.6vh 0; border-bottom: 1px solid rgba(0,145,255,0.06);
      transition: all 0.25s;
    }
    .rank-item:hover { padding-left: 0.3vw; }

    .rank-no {
      width: clamp(18px, 1.3vw, 24px); aspect-ratio: 1; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(10px, 0.65vw, 13px); font-weight: 700;
      margin-right: 0.6vw; flex-shrink: 0;
    }
    .rank-no.r1 { background: linear-gradient(135deg, #ff6b35, #ff4d5a); color: #fff; }
    .rank-no.r2 { background: linear-gradient(135deg, #ffb400, #ff8c00); color: #fff; }
    .rank-no.r3 { background: linear-gradient(135deg, #00d4ff, #0088ff); color: #fff; }
    .rank-no.r4 { background: rgba(0,212,255,0.15); color: var(--sub); }

    .rank-name { flex: 1; font-size: clamp(11px, 0.7vw, 13px); }

    .rank-bar-w {
      width: 5vw; height: 5px;
      background: rgba(0,145,255,0.1); border-radius: 3px;
      margin: 0 0.6vw; overflow: hidden; flex-shrink: 0;
    }
    .rank-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--pri), var(--ok)); }

    .rank-val {
      font-size: clamp(11px, 0.7vw, 13px); color: var(--pri);
      font-family: 'Courier New', monospace; min-width: 3vw; text-align: right; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-bg"></div>
    <svg class="hd-deco l" viewBox="0 0 280 30"><path d="M0 15 L60 15 L75 5 L140 5 L150 15 L280 15" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/><circle cx="75" cy="5" r="2" fill="var(--pri)" opacity="0.8"/><circle cx="140" cy="5" r="2" fill="var(--pri)" opacity="0.8"/></svg>
    <svg class="hd-deco r" viewBox="0 0 280 30"><path d="M0 15 L60 15 L75 5 L140 5 L150 15 L280 15" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/><circle cx="75" cy="5" r="2" fill="var(--pri)" opacity="0.8"/><circle cx="140" cy="5" r="2" fill="var(--pri)" opacity="0.8"/></svg>
    <div class="hd-left"><div class="hd-info" id="hdDate"></div></div>
    <div class="hd-title">东软智慧健康 · 数据运营中心</div>
    <div class="hd-right">
      <div class="hd-time" id="hdTime"></div>
      <button class="hd-btn" onclick="toggleFS()">⛶ 全屏</button>
    </div>
  </div>

  <div class="main">
    <div class="kpi">
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>累计用户</span>
          <span class="kpi-badge up">↑ 12%</span>
        </div>
        <div class="kpi-val">128,456</div><div class="kpi-desc">较昨日 +1,234</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>今日新增</span>
          <span class="kpi-badge up">↑ 8.5%</span>
        </div>
        <div class="kpi-val">1,234</div><div class="kpi-desc">较昨日 +98</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>活跃用户</span>
          <span class="kpi-badge up">↑ 5.2%</span>
        </div>
        <div class="kpi-val">8,562</div><div class="kpi-desc">当前在线 3,421</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>付费会员</span>
          <span class="kpi-badge up">↑ 3.8%</span>
        </div>
        <div class="kpi-val">12,345</div><div class="kpi-desc">转化率 9.6%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>今日咨询</span>
          <span class="kpi-badge up">↑ 15%</span>
        </div>
        <div class="kpi-val">5,234</div><div class="kpi-desc">AI回复率 85%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>AI响应</span>
          <span class="kpi-badge down">↓ 0.3s</span>
        </div>
        <div class="kpi-val">1.2s</div><div class="kpi-desc">平均响应时间</div>
      </div>
    </div>

    <div class="col-l">
      <div class="pnl" style="flex:1;">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>用户增长趋势</div>
        <div class="cbox" id="cTrend"></div>
      </div>
      <div class="pnl" style="flex:1;">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>健康咨询分类</div>
        <div class="cbox" id="cCat"></div>
      </div>
    </div>

    <div class="col-c">
      <div class="pnl pnl-map">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>用户地域分布</div>
        <div class="cbox" id="cMap"></div>
      </div>
      <div class="pnl-bot">
        <div class="pnl">
          <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
          <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>会员等级分布</div>
          <div class="cbox" id="cMem"></div>
        </div>
        <div class="pnl">
          <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
          <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>AI性能指标</div>
          <div class="cbox" id="cGauge"></div>
        </div>
      </div>
    </div>

    <div class="col-r">
      <div class="pnl" style="flex:0 0 28%;">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff4d5a" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>咨询量趋势</div>
        <div class="cbox" id="cConsult"></div>
      </div>
      <div class="pnl pnl-live">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>实时咨询动态</div>
        <div class="live-hd">
          <span style="font-size:clamp(10px,0.7vw,13px);color:var(--sub);"><span class="live-dot"></span>实时滚动</span>
          <span class="live-cnt">856 在线</span>
        </div>
        <div class="live-wrap"><div class="live-scroll" id="liveScroll"></div></div>
      </div>
      <div class="pnl" style="flex:1;">
        <div class="pnl-corner tl"></div><div class="pnl-corner tr"></div><div class="pnl-corner bl"></div><div class="pnl-corner br"></div>
        <div class="pnl-tt"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>热门咨询排行</div>
        <ul class="rank-list" id="rankList"></ul>
      </div>
    </div>
  </div>
</div>

<script>
function updTime() {
  const n = new Date()
  document.getElementById('hdDate').textContent = n.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'long'})
  document.getElementById('hdTime').textContent = n.toLocaleTimeString('zh-CN',{hour12:false})
}
setInterval(updTime, 1000); updTime()

function toggleFS() {

function mkBase() {
  return {
    backgroundColor:'transparent',
    tooltip:{ backgroundColor:'rgba(3,11,26,0.92)', borderColor:'rgba(0,212,255,0.3)', textStyle:{color:'#e0ecff',fontSize:12} },

    animationDuration:1500

}

function initCat() {
  const c = echarts.init(document.getElementById('cCat'))
  const fallback = {nm:['内科','外科','儿科','妇产科','皮肤科','眼科','骨科','神经科'],vl:[4500,3200,2800,2600,2200,1800,1500,1200]}
  const renderCat = (nm,vl) => {
    c.setOption(Object.assign(mkBase(),{
      grid:{left:'22%',right:'5%',top:'5%',bottom:'8%'},
      xAxis:{type:'value',axisLine:{show:false},axisLabel:{color:'rgba(180,210,255,0.5)',fontSize:10},splitLine:{lineStyle:{color:'rgba(0,145,255,0.08)'}}},
      yAxis:{type:'category',data:[...nm].reverse(),axisLine:{lineStyle:{color:'rgba(0,145,255,0.3)'}},axisLabel:{color:'rgba(180,210,255,0.7)',fontSize:11},axisTick:{show:false}},
      series:[{type:'bar',data:[...vl].reverse(),barWidth:'40%',itemStyle:{borderRadius:[0,4,4,0],color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'rgba(0,212,255,0.2)'},{offset:1,color:'#00d4ff'}])},animationDelay:function(i){return i*80}}]
    }))
  }
  fetch('/api/v1/admin/stats/categories')
    .then(r=>r.json())
    .then(res=>{
      if(res.code===0 && res.data && res.data.length>0){
        const nm=res.data.map(d=>d.name), vl=res.data.map(d=>d.value)
        renderCat(nm,vl)
      } else {
        renderCat(fallback.nm,fallback.vl)
      }
    })
    .catch(()=>renderCat(fallback.nm,fallback.vl))
  cs.push(c)
}

function initLive() {
  const w = document.getElementById('liveScroll')
  const us = ['王**','李**','张**','赵**','刘**','陈**','杨**','黄**','周**','吴**','孙**','马**']
  const ms = ['头痛三天吃什么药','血压偏高如何调理','孩子发烧38度怎么办','失眠多梦怎么改善','胃疼吃什么药好','皮肤过敏红肿怎么办','咳嗽有痰吃什么药','腰疼什么原因','眼睛干涩怎么缓解','总是疲劳乏力','血糖偏高饮食注意','颈椎病如何预防']
  let h = ''
  for(let r=0;r<2;r++) for(let i=0;i<15;i++){
    const u=us[Math.floor(Math.random()*us.length)], m=ms[Math.floor(Math.random()*ms.length)]
    const hh=9+Math.floor(Math.random()*9), mi=String(Math.floor(Math.random()*60)).padStart(2,'0')
    h += `<div class="live-item"><div class="live-av">${u.charAt(0)}</div><div class="live-info"><div class="live-name">${u}</div><div class="live-msg">咨询了"${m}"</div></div><div class="live-time">${hh}:${mi}</div></div>`
  }
  w.innerHTML = h
}

function initRank() {
  const el = document.getElementById('rankList')
  const its = [{name:'感冒发烧咨询',v:2856},{name:'高血压管理',v:2341},{name:'糖尿病饮食',v:1987},{name:'失眠调理',v:1654},{name:'皮肤过敏',v:1432},{name:'儿童用药',v:1298},{name:'腰椎间盘突出',v:1156},{name:'孕期保健',v:1023}]
  const mx = its[0].v
  el.innerHTML = its.map((it,i)=>{
    const rk = i<3?`r${i+1}`:'r4'
    const pct = (it.v/mx*100).toFixed(0)
    return `<li class="rank-item"><span class="rank-no ${rk}">${i+1}</span><span class="rank-name">${it.name}</span><span class="rank-bar-w"><span class="rank-bar" style="width:${pct}%"></span></span><span class="rank-val">${it.v}</span></li>`
  }).join('')
}
