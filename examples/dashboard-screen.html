<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>东软智慧健康 · 数据运营中心</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scanLine { 0% { top: -2px; } 100% { top: 100%; } }
    @keyframes borderFlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    @keyframes dataWave {
      0% { transform: translateX(-100%); opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { transform: translateX(100%); opacity: 0.3; }
    }
    @keyframes dotPulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
    }

    :root {
      --bg: #030b1a;
      --bg-card: rgba(6, 30, 65, 0.65);
      --border: rgba(0, 145, 255, 0.2);
      --primary: #00d4ff;
      --success: #00ff88;
      --warning: #ffb400;
      --danger: #ff4d5a;
      --text: #e0ecff;
      --text-sub: rgba(180, 210, 255, 0.6);
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      width: 1920px;
      height: 1080px;
    }

    .dashboard {
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(0, 80, 200, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(0, 100, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 100, 255, 0.06) 0%, transparent 50%),
        linear-gradient(180deg, #030b1a 0%, #061328 50%, #030b1a 100%);
      position: relative;
    }

    .dashboard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        linear-gradient(90deg, rgba(0, 145, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(0, 145, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .header {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.8s ease-out;
    }

    .header-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 80, 200, 0.25) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .header-bg::before {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 20px var(--primary), 0 0 60px rgba(0, 212, 255, 0.3);
    }

    .header-bg::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--primary) 50%, var(--border) 80%, transparent 100%);
    }

    .header-deco-l, .header-deco-r {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      height: 30px;
      opacity: 0.4;
    }

    .header-deco-l { left: 60px; }
    .header-deco-r { right: 60px; transform: translateY(-50%) scaleX(-1); }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #a0d8ff, #ffffff, #00d4ff, #ffffff, #a0d8ff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: borderFlow 6s linear infinite;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      position: relative;
      z-index: 1;
    }

    .header-left {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 1;
    }

    .header-right {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 28px;
      z-index: 1;
    }

    .header-info {
      font-size: 13px;
      color: var(--text-sub);
      letter-spacing: 1px;
    }

    .header-time {
      font-size: 20px;
      font-family: 'Courier New', monospace;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .btn-fullscreen {
      padding: 6px 16px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--border);
      color: var(--primary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }

    .btn-fullscreen:hover {
      background: rgba(0, 212, 255, 0.25);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 480px 1fr 480px;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 14px 20px 16px;
      position: relative;
      z-index: 1;
    }

    .kpi-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.35s ease;
      animation: slideUp 0.5s ease-out backwards;
    }

    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.2s; }
    .kpi-card:nth-child(5) { animation-delay: 0.25s; }
    .kpi-card:nth-child(6) { animation-delay: 0.3s; }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .kpi-card:hover {
      border-color: rgba(0, 212, 255, 0.5);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.15);
    }

    .kpi-card:hover::after { opacity: 1; }

    .kpi-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .kpi-label {
      font-size: 13px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kpi-label svg { flex-shrink: 0; }

    .kpi-badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .kpi-badge.up {
      color: var(--success);
      background: rgba(0, 255, 136, 0.1);
    }

    .kpi-badge.down {
      color: var(--danger);
      background: rgba(255, 77, 90, 0.1);
    }

    .kpi-val {
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .kpi-desc {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 6px;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: borderFlow 3s linear infinite;
    }

    .panel-corner {
      position: absolute;
      width: 14px;
      height: 14px;
      pointer-events: none;
    }

    .panel-corner.tl { top: -1px; left: -1px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .panel-corner.tr { top: -1px; right: -1px; border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .panel-corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .panel-corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      padding-left: 12px;
      border-left: 3px solid var(--primary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-title svg { flex-shrink: 0; }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin-left: 12px;
    }

    .chart-box { flex: 1; min-height: 0; }

    .col-left, .col-right {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .col-center {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .center-map { flex: 1.3; }
    .center-bottom { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .live-panel { flex: 1; display: flex; flex-direction: column; }

    .live-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: dotPulse 2s ease-out infinite;
    }

    .live-count { font-size: 13px; color: var(--success); }

    .live-list-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .live-scroll {
      animation: scrollUp 30s linear infinite;
    }

    .live-scroll:hover { animation-play-state: paused; }

    .live-item {
      display: flex;
      align-items: center;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(0, 145, 255, 0.08);
      border-radius: 4px;
      transition: all 0.25s;
      cursor: default;
    }

    .live-item:hover {
      background: rgba(0, 212, 255, 0.08);
      padding-left: 14px;
    }

    .live-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #0066cc);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .live-info { flex: 1; min-width: 0; }

    .live-name {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .live-msg {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .live-time {
      font-size: 11px;
      color: var(--text-sub);
      margin-left: 8px;
      flex-shrink: 0;
    }

    .stat-list { list-style: none; }

    .stat-item {
      display: flex;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(0, 145, 255, 0.06);
      transition: all 0.25s;
    }

    .stat-item:hover { padding-left: 6px; }

    .stat-rank {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .stat-rank.r1 { background: linear-gradient(135deg, #ff6b35, #ff4d5a); color: #fff; }
    .stat-rank.r2 { background: linear-gradient(135deg, #ffb400, #ff8c00); color: #fff; }
    .stat-rank.r3 { background: linear-gradient(135deg, #00d4ff, #0088ff); color: #fff; }
    .stat-rank.r4 { background: rgba(0, 212, 255, 0.15); color: var(--text-sub); }

    .stat-name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }

    .stat-bar-wrap {
      width: 80px;
      height: 6px;
      background: rgba(0, 145, 255, 0.1);
      border-radius: 3px;
      margin: 0 10px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--primary), var(--success));
      transition: width 1s ease-out;
    }

    .stat-val {
      font-size: 13px;
      color: var(--primary);
      font-family: 'Courier New', monospace;
      min-width: 40px;
      text-align: right;
    }

    .bottom-left { animation: slideInLeft 0.6s ease-out 0.4s backwards; }
    .bottom-right { animation: slideInRight 0.6s ease-out 0.5s backwards; }
  </style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="header">
    <div class="header-bg"></div>
    <svg class="header-deco-l" viewBox="0 0 280 30">
      <path d="M0 15 L60 15 L75 5 L140 5 L150 15 L280 15" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
      <path d="M75 5 L75 0 M140 5 L140 0" fill="none" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
      <circle cx="75" cy="5" r="2" fill="var(--primary)" opacity="0.8"/>
      <circle cx="140" cy="5" r="2" fill="var(--primary)" opacity="0.8"/>
    </svg>
    <svg class="header-deco-r" viewBox="0 0 280 30">
      <path d="M0 15 L60 15 L75 5 L140 5 L150 15 L280 15" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
      <circle cx="75" cy="5" r="2" fill="var(--primary)" opacity="0.8"/>
      <circle cx="140" cy="5" r="2" fill="var(--primary)" opacity="0.8"/>
    </svg>
    <div class="header-left">
      <div class="header-info" id="headerDate"></div>
    </div>
    <div class="title">东软智慧健康 · 数据运营中心</div>
    <div class="header-right">
      <div class="header-time" id="headerTime"></div>
      <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ 全屏</button>
    </div>
  </div>

  <div class="main">
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            累计用户
          </span>
          <span class="kpi-badge up">↑ 12%</span>
        </div>
        <div class="kpi-val">128,456</div>
        <div class="kpi-desc">较昨日 +1,234</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            今日新增
          </span>
          <span class="kpi-badge up">↑ 8.5%</span>
        </div>
        <div class="kpi-val">1,234</div>
        <div class="kpi-desc">较昨日 +98</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            活跃用户
          </span>
          <span class="kpi-badge up">↑ 5.2%</span>
        </div>
        <div class="kpi-val">8,562</div>
        <div class="kpi-desc">当前在线 3,421</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            付费会员
          </span>
          <span class="kpi-badge up">↑ 3.8%</span>
        </div>
        <div class="kpi-val">12,345</div>
        <div class="kpi-desc">转化率 9.6%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            今日咨询
          </span>
          <span class="kpi-badge up">↑ 15%</span>
        </div>
        <div class="kpi-val">5,234</div>
        <div class="kpi-desc">AI回复率 85%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top">
          <span class="kpi-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            AI响应
          </span>
          <span class="kpi-badge down">↓ 0.3s</span>
        </div>
        <div class="kpi-val">1.2s</div>
        <div class="kpi-desc">平均响应时间</div>
      </div>
    </div>

    <div class="col-left">
      <div class="panel" style="flex:1;">
        <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
        <div class="panel-corner bl"></div><div class="panel-corner br"></div>
        <div class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          用户增长趋势
        </div>
        <div class="chart-box" id="chartUserTrend"></div>
      </div>
      <div class="panel" style="flex:1;">
        <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
        <div class="panel-corner bl"></div><div class="panel-corner br"></div>
        <div class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffb400" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          健康咨询分类
        </div>
        <div class="chart-box" id="chartCategory"></div>
      </div>
    </div>

    <div class="col-center">
      <div class="panel center-map">
        <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
        <div class="panel-corner bl"></div><div class="panel-corner br"></div>
        <div class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          用户地域分布
        </div>
        <div class="chart-box" id="chartMap"></div>
      </div>
      <div class="center-bottom">
        <div class="panel bottom-left">
          <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
          <div class="panel-corner bl"></div><div class="panel-corner br"></div>
          <div class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            会员等级分布
          </div>
          <div class="chart-box" id="chartMember"></div>
        </div>
        <div class="panel bottom-right">
          <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
          <div class="panel-corner bl"></div><div class="panel-corner br"></div>
          <div class="panel-title">

<script>
function updateTime() {
  const now = new Date()
  document.getElementById('headerDate').textContent = now.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'long' })
  document.getElementById('headerTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false })
}
setInterval(updateTime, 1000)
updateTime()

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen()
  else document.exitFullscreen()
}

const dates = []
const now = new Date()
for (let i = 29; i >= 0; i--) {
  const d = new Date(now); d.setDate(d.getDate() - i)
  dates.push(`${d.getMonth()+1}/${d.getDate()}`)
}

const charts = []

function initUserTrend() {
  const c = echarts.init(document.getElementById('chartUserTrend'))
  const total = [], neu = []
  let base = 100000
  for (let i = 0; i < 30; i++) {
    const inc = Math.floor(Math.random() * 1200) + 600
    base += inc; total.push(base); neu.push(inc)
  }
  c.setOption({
    tooltip: { trigger:'axis', backgroundColor:'rgba(3,11,26,0.9)', borderColor:'rgba(0,212,255,0.3)', textStyle:{color:'#e0ecff',fontSize:12} },
    legend: { data:['累计用户','新增'], textStyle:{color:'rgba(180,210,255,0.6)',fontSize:11}, top:0, right:0, itemWidth:12, itemHeight:8 },
    grid: { left:45, right:10, top:28, bottom:22 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'rgba(0,145,255,0.3)'}}, axisLabel:{color:'rgba(180,210,255,0.5)',fontSize:10,interval:4}, axisTick:{show:false} },
    yAxis: [
      { type:'value', axisLine:{show:false}, axisLabel:{color:'rgba(180,210,255,0.5)',fontSize:10,formatter:v=>(v/10000).toFixed(0)+'万'}, splitLine:{lineStyle:{color:'rgba(0,145,255,0.08)'}} },
      { type:'value', axisLine:{show:false}, axisLabel:{color:'rgba(180,210,255,0.5)',fontSize:10}, splitLine:{show:false} }
    ],
    series: [
      { name:'累计用户', type:'line', smooth:true, showSymbol:false, lineStyle:{color:'#00d4ff',width:2}, areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,212,255,0.25)'},{offset:1,color:'rgba(0,212,255,0.01)'}])}, data:total, animationDuration:1800 },
      { name:'新增', type:'line', yAxisIndex:1, smooth:true, showSymbol:false, lineStyle:{color:'#00ff88',width:1.5}, data:neu, animationDuration:1800, animationDelay:300 }
    ]
  })
  charts.push(c)
}

function initMap() {

  ]

      echarts.registerMap('china', geoJson)
      c.setOption({
        tooltip: {
          trigger:'item',
          backgroundColor:'rgba(3,11,26,0.95)',
          borderColor:'rgba(0,212,255,0.3)',
          textStyle:{color:'#e0ecff',fontSize:12},
          formatter:function(p){
            if(p.componentType==='series') return p.name+'<br/>用户数: <b style="color:#00d4ff">'+(p.value[2]?p.value[2].toLocaleString():p.value.toLocaleString())+'</b>'

          itemStyle:{ areaColor:'rgba(0,60,140,0.35)', borderColor:'rgba(0,145,255,0.5)', borderWidth:1 },
          emphasis:{ itemStyle:{ areaColor:'rgba(0,140,255,0.6)' }, label:{show:false} },
          label:{show:false}
        },
        series: [
          {
            name:'用户分布', type:'map', map:'china', roam:false, zoom:1.15, center:[104,36],
            itemStyle:{ areaColor:'rgba(0,60,140,0.35)', borderColor:'rgba(0,145,255,0.5)', borderWidth:1 },
            emphasis:{ itemStyle:{ areaColor:'rgba(0,140,255,0.6)' }, label:{color:'#fff',fontSize:12} },
            label:{show:false},
            data:mapData,
            animationDuration:1500
          },
          {
            name:'城市热点', type:'effectScatter', coordinateSystem:'geo', data:scatterData,
            symbolSize:function(val){ return Math.max(8, val[2]/400) },

            itemStyle:{ color:'#00d4ff', shadowBlur:10, shadowColor:'rgba(0,212,255,0.5)' },
            label:{show:false},
            animationDuration:1500, animationDelay:500
          }
        ]
      })

    .catch(()=>{
      c.setOption({
        graphic:{
          type:'text', left:'center', top:'middle',
          style:{ text:'地图数据加载中...', fill:'rgba(180,210,255,0.5)', fontSize:14 }
        }
      })

}

  const c = echarts.init(document.getElementById('chartMember'))
  c.setOption({
    tooltip: { trigger:'item', backgroundColor:'rgba(3,11,26,0.9)', borderColor:'rgba(0,212,255,0.3)', textStyle:{color:'#e0ecff',fontSize:12}, formatter:'{b}: {c} ({d}%)' },

function initGauge() {
  const c = echarts.init(document.getElementById('chartGauge'))
  c.setOption({
    series: [
      {
        type:'gauge', center:['25%','55%'], radius:'70%', startAngle:200, endAngle:-20, min:0, max:5,
        axisLine:{ lineStyle:{ width:10, color:[[0.4,'#00ff88'],[0.7,'#ffb400'],[1,'#ff4d5a']] } },
        axisTick:{ show:false }, splitLine:{ show:false },
        axisLabel:{ show:false },
        pointer:{ length:'60%', width:4, itemStyle:{color:'#e0ecff'} },

    ]
  })

function initConsult() {
  const c = echarts.init(document.getElementById('chartConsult'))
  const total = [], ai = [], faq = []
  for (let i = 0; i < 30; i++) {
    const t = Math.floor(Math.random()*2500)+3500
    total.push(t); ai.push(Math.floor(t*(0.78+Math.random()*0.12))); faq.push(Math.floor(t*(0.08+Math.random()*0.1)))

    tooltip: { trigger:'axis', backgroundColor:'rgba(3,11,26,0.9)', borderColor:'rgba(0,212,255,0.3)', textStyle:{color:'#e0ecff',fontSize:12} },

function initLive() {
  const wrap = document.getElementById('liveScroll')
  const users = ['王**','李**','张**','赵**','刘**','陈**','杨**','黄**','周**','吴**','孙**','马**']
  const msgs = ['头痛三天吃什么药','血压偏高如何调理','孩子发烧38度怎么办','失眠多梦怎么改善','胃疼吃什么药好','皮肤过敏红肿怎么办','咳嗽有痰吃什么药','腰疼什么原因','眼睛干涩怎么缓解','总是疲劳乏力','血糖偏高饮食注意','颈椎病如何预防']
  let html = ''
  for (let r = 0; r < 2; r++) {
    for (let i = 0; i < 15; i++) {
      const u = users[Math.floor(Math.random()*users.length)]
      const m = msgs[Math.floor(Math.random()*msgs.length)]
      const h = 9+Math.floor(Math.random()*9), mi = String(Math.floor(Math.random()*60)).padStart(2,'0')
      html += `<div class="live-item"><div class="live-avatar">${u.charAt(0)}</div><div class="live-info"><div class="live-name">${u}</div><div class="live-msg">咨询了"${m}"</div></div><div class="live-time">${h}:${mi}</div></div>`
    }
  }
  wrap.innerHTML = html
}

function initRank() {
  const el = document.getElementById('rankList')
  const items = [
    {name:'感冒发烧咨询',val:2856},{name:'高血压管理',val:2341},{name:'糖尿病饮食',val:1987},
    {name:'失眠调理',val:1654},{name:'皮肤过敏',val:1432},{name:'儿童用药',val:1298},
    {name:'腰椎间盘突出',val:1156},{name:'孕期保健',val:1023}
  ]
  const max = items[0].val
  el.innerHTML = items.map((it,i) => {
    const rk = i < 3 ? `r${i+1}` : 'r4'
    const pct = (it.val/max*100).toFixed(0)
    return `<li class="stat-item"><span class="stat-rank ${rk}">${i+1}</span><span class="stat-name">${it.name}</span><span class="stat-bar-wrap"><span class="stat-bar" style="width:${pct}%"></span></span><span class="stat-val">${it.val}</span></li>`
  }).join('')
}

function init() {
  initUserTrend()
  initCategory()
  initMap()
  initMember()
  initGauge()
  initConsult()
  initLive()
  initRank()
}

window.addEventListener('load', init)
window.addEventListener('resize', () => charts.forEach(c => c.resize()))

function handleResize() {
  const sx = window.innerWidth / 1920
  const sy = window.innerHeight / 1080
  const s = Math.min(sx, sy)
  const app = document.getElementById('app')
  app.style.transform = `scale(${s})`
  app.style.transformOrigin = 'top left'
}
window.addEventListener('resize', handleResize)
handleResize()
</script>
