<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 东软智慧健康管理系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <script src="https://unpkg.com/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #001529;
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .logo-area {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #002140;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-icon {
      font-size: 28px;
      margin-right: 10px;
    }

    .menu {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .menu-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.3s;
      color: rgba(255, 255, 255, 0.65);
      font-size: 14px;
    }

    .menu-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .menu-item.active {
      color: #1890ff;
      background: rgba(24, 144, 255, 0.15);
    }

    .menu-icon {
      margin-right: 12px;
      font-size: 16px;
    }

    .menu-text {
      flex: 1;
    }

    .menu-arrow {
      font-size: 12px;
      transition: transform 0.3s;
    }

    .menu-arrow.expanded {
      transform: rotate(180deg);
    }

    .submenu {
      background: #000c17;
      padding-left: 20px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease-out;
    }

    .submenu.expanded {
      max-height: 500px;
    }

    .submenu-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.3s;
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
    }

    .submenu-item:hover {
      color: #fff;
    }

    .submenu-item.active {
      color: #1890ff;
    }

    .main-content {
      flex: 1;
      margin-left: 240px;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 64px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .breadcrumb {
      font-size: 14px;
      color: #666;
    }

    .breadcrumb-item {
      cursor: pointer;
    }

    .breadcrumb-item:hover {
      color: #1890ff;
    }

    .breadcrumb-separator {
      margin: 0 8px;
      color: #ccc;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-icon {
      font-size: 18px;
      cursor: pointer;
      color: #666;
      transition: color 0.3s;
    }

    .header-icon:hover {
      color: #1890ff;
    }

    .user-dropdown {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .user-dropdown:hover {
      background: #f5f5f5;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
    }

    .user-name {
      font-size: 14px;
      color: #333;
    }

    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: all 0.3s;
      cursor: pointer;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .stat-title {
      font-size: 14px;
      color: #666;
    }

    .stat-icon {
      font-size: 24px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .stat-trend {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-trend.up {
      color: #52c41a;
    }

    .stat-trend.down {
      color: #f5222d;
    }

    .charts-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-actions {
      display: flex;
      gap: 10px;
    }

    .chart-action-btn {
      padding: 4px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      transition: all 0.3s;
    }

    .chart-action-btn:hover {
      border-color: #1890ff;
      color: #1890ff;
    }

    .chart-action-btn.active {
      background: #1890ff;
      color: #fff;
      border-color: #1890ff;
    }

    .chart-container {
      width: 100%;
      height: 300px;
    }

    .bottom-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .todo-card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .todo-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .todo-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 8px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .todo-item:hover {
      background: #f9f9f9;
      transform: translateX(4px);
    }

    .todo-priority {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 12px;
    }

    .todo-priority.high {
      background: #f5222d;
    }

    .todo-priority.medium {
      background: #faad14;
    }

    .todo-priority.low {
      background: #52c41a;
    }

    .todo-content {
      flex: 1;
    }

    .todo-text {
      font-size: 14px;
      color: #333;
      margin-bottom: 4px;
    }

    .todo-time {
      font-size: 12px;
      color: #999;
    }

    .todo-action {
      padding: 4px 12px;
      border: 1px solid #1890ff;
      border-radius: 4px;
      background: #fff;
      color: #1890ff;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }

    .todo-action:hover {
      background: #1890ff;
      color: #fff;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .quick-action-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      padding: 20px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .quick-action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .notification-badge {
      position: relative;
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #f5222d;
      color: #fff;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    @media (max-width: 1400px) {
      .stats-cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 1200px) {
      .charts-section {
        grid-template-columns: 1fr;
      }

      .bottom-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 64px;
      }

      .menu-text,
      .menu-arrow {
        display: none;
      }

      .menu-item {
        justify-content: center;
        padding: 12px;
      }

      .menu-icon {
        margin-right: 0;
      }

      .main-content {
        margin-left: 64px;
      }

      .stats-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-container">
      <div class="sidebar">
        <div class="logo-area">
          <span class="logo-icon">🏥</span>
          <span>东软健康</span>
        </div>

        <div class="menu">
          <template v-for="item in menuItems" :key="item.id">
            <div
              class="menu-item"
              :class="{ active: activeMenu === item.id }"
              @click="handleMenuClick(item)"
            >
              <span class="menu-icon">{{ item.icon }}</span>
              <span class="menu-text">{{ item.name }}</span>
              <span
                v-if="item.children && item.children.length"
                class="menu-arrow"
                :class="{ expanded: expandedMenus.includes(item.id) }"
              >
                ▼
              </span>
            </div>

            <div
              v-if="item.children && item.children.length && expandedMenus.includes(item.id)"
              class="submenu expanded"
            >
              <div
                v-for="child in item.children"
                :key="child.id"
                class="submenu-item"
                :class="{ active: activeMenu === child.id }"
                @click="handleSubMenuClick(child)"
              >
                {{ child.name }}
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="main-content">
        <div class="header">
          <div class="header-left">
            <div class="breadcrumb">
              <span class="breadcrumb-item">首页</span>
              <span class="breadcrumb-separator">/</span>
              <span class="breadcrumb-item">工作台</span>
            </div>
          </div>

          <div class="header-right">
            <div class="header-icon notification-badge">
              🔔
              <span class="badge">5</span>
            </div>
            <div class="header-icon">⚙️</div>
            <div class="user-dropdown">
              <div class="user-avatar">管</div>
              <span class="user-name">管理员</span>
              <span>▼</span>
            </div>
          </div>
        </div>

        <div class="content">
          <div class="page-title">工作台</div>

          <div class="stats-cards">
            <div
              v-for="stat in stats"
              :key="stat.id"
              class="stat-card"
              @click="handleStatClick(stat)"
            >
              <div class="stat-header">
                <span class="stat-title">{{ stat.title }}</span>
                <span class="stat-icon">{{ stat.icon }}</span>
              </div>
              <div class="stat-value">{{ stat.value }}</div>
              <div class="stat-trend" :class="stat.trend >= 0 ? 'up' : 'down'">
                <span>{{ stat.trend >= 0 ? '↑' : '↓' }}</span>
                <span>{{ Math.abs(stat.trend) }}%</span>
                <span style="color: #999; margin-left: 4px;">较昨日</span>
              </div>
            </div>
          </div>

          <div class="charts-section">
            <div class="chart-card">
              <div class="chart-title">
                <span>用户增长趋势</span>
                <div class="chart-actions">
                  <button
                    v-for="period in periods"
                    :key="period.value"
                    class="chart-action-btn"
                    :class="{ active: selectedPeriod === period.value }"
                    @click="selectedPeriod = period.value"
                  >
                    {{ period.label }}
                  </button>
                </div>
              </div>
              <div class="chart-container" id="userTrendChart"></div>
            </div>

            <div class="chart-card">
              <div class="chart-title">
                <span>咨询量统计</span>
                <div class="chart-actions">
                  <button
                    v-for="period in periods"
                    :key="period.value"
                    class="chart-action-btn"
                    :class="{ active: selectedPeriod === period.value }"
                    @click="selectedPeriod = period.value"
                  >
                    {{ period.label }}
                  </button>
                </div>
              </div>
              <div class="chart-container" id="consultChart"></div>
            </div>
          </div>

          <div class="bottom-section">
            <div class="todo-card">
              <div class="todo-header">
                <span class="todo-title">待办事项</span>
                <span style="font-size: 14px; color: #999;">共 {{ todoList.length }} 项</span>
              </div>
              <div class="todo-list">
                <div v-for="todo in todoList" :key="todo.id" class="todo-item">
                  <div
                    class="todo-priority"
                    :class="todo.priority"
                  ></div>
                  <div class="todo-content">
                    <div class="todo-text">{{ todo.text }}</div>
                    <div class="todo-time">{{ todo.time }}</div>
                  </div>
                  <button class="todo-action" @click="handleTodoAction(todo)">
                    处理
                  </button>
                </div>
              </div>
            </div>

            <div class="todo-card">
              <div class="todo-header">
                <span class="todo-title">快捷操作</span>
              </div>
              <div class="quick-actions">
                <div
                  v-for="action in quickActions"
                  :key="action.id"
                  class="quick-action-card"
                  @click="handleQuickAction(action)"
                >
                  <div class="quick-action-icon">{{ action.icon }}</div>
                  <div class="quick-action-text">{{ action.text }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
      setup() {
        const activeMenu = ref('dashboard');
        const expandedMenus = ref([]);
        const selectedPeriod = ref('7');

        const menuItems = [
          { id: 'dashboard', name: '工作台', icon: '📊' },
          { id: 'user', name: '用户管理', icon: '👥' },
          { id: 'review', name: '内容审核', icon: '🔍' },
          { id: 'member', name: '会员管理', icon: '💎' },
          { id: 'payment', name: '支付管理', icon: '💰' },
          { id: 'content', name: '内容管理', icon: '📝' },
          { id: 'config', name: '系统配置', icon: '⚙️' },
          { id: 'permission', name: '权限管理', icon: '🔐' },
          { id: 'log', name: '系统监控', icon: '📈' },
          { id: 'screen', name: '数据大屏', icon: '🖥️' }
        ];

        const stats = [
          { id: 1, title: '累计用户', value: '128,456', icon: '👥', trend: 12 },
          { id: 2, title: '今日新增', value: '1,234', icon: '📈', trend: 8.5 },
          { id: 3, title: '活跃用户', value: '8,562', icon: '🔥', trend: 5.2 },
          { id: 4, title: '付费用户', value: '12,345', icon: '💎', trend: 3.8 }
        ];

        const periods = [
          { label: '近7天', value: '7' },
          { label: '近30天', value: '30' }
        ];

        const todoList = [
          { id: 1, text: '审核用户消息 12 条', time: '10分钟前', priority: 'high' },
          { id: 2, text: '处理退款申请 5 笔', time: '30分钟前', priority: 'high' },
          { id: 3, text: '更新FAQ内容 3 条', time: '1小时前', priority: 'medium' },
          { id: 4, text: '查看系统日志', time: '2小时前', priority: 'low' },
          { id: 5, text: '会员续期提醒', time: '3小时前', priority: 'medium' }
        ];

        const quickActions = [
          { id: 1, text: '用户管理', icon: '👥' },
          { id: 2, text: '内容审核', icon: '🔍' },
          { id: 3, text: '会员管理', icon: '💎' },
          { id: 4, text: '数据大屏', icon: '🖥️' }
        ];

        let userTrendChart = null;
        let consultChart = null;

        const handleMenuClick = (item) => {
          if (item.children && item.children.length) {
            const index = expandedMenus.value.indexOf(item.id);
            if (index > -1) {
              expandedMenus.value.splice(index, 1);
            } else {
              expandedMenus.value.push(item.id);
            }
          } else {
            activeMenu.value = item.id;
          }
        };

        const handleSubMenuClick = (child) => {
          activeMenu.value = child.id;
        };

        const handleStatClick = (stat) => {
          ElMessage.success(`跳转到${stat.title}详情`);
        };

        const handleTodoAction = (todo) => {
          ElMessage.success(`开始处理：${todo.text}`);
        };

        const handleQuickAction = (action) => {
          ElMessage.success(`跳转到${action.text}`);
        };

        const initUserTrendChart = () => {
          const chart = echarts.init(document.getElementById('userTrendChart'));
          const dates = [];
          const data = [];
          for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(`${d.getMonth() + 1}/${d.getDate()}`);
            data.push(Math.floor(Math.random() * 2000) + 1000);
          }

          const option = {
            tooltip: { trigger: 'axis' },
            xAxis: {
              type: 'category',
              data: dates,
              axisLine: { lineStyle: { color: '#e0e0e0' } }
            },
            yAxis: {
              type: 'value',
              axisLine: { lineStyle: { color: '#e0e0e0' } },
              splitLine: { lineStyle: { color: '#f0f0f0' } }
            },
            series: [{
              data: data,
              type: 'line',
              smooth: true,
              areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: 'rgba(24, 144, 255, 0.3)' },
                  { offset: 1, color: 'rgba(24, 144, 255, 0.05)' }
                ])
              },
              lineStyle: { color: '#1890ff' }
            }]
          };
          chart.setOption(option);
          userTrendChart = chart;
        };

        const initConsultChart = () => {
          const chart = echarts.init(document.getElementById('consultChart'));
          const dates = [];
          const aiData = [];
          const faqData = [];
          for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(`${d.getMonth() + 1}/${d.getDate()}`);
            aiData.push(Math.floor(Math.random() * 3000) + 2000);
            faqData.push(Math.floor(Math.random() * 1000) + 500);
          }

          const option = {
            tooltip: { trigger: 'axis' },
            legend: {
              data: ['AI回复', 'FAQ命中'],
              bottom: 0
            },
            xAxis: {
              type: 'category',
              data: dates,
              axisLine: { lineStyle: { color: '#e0e0e0' } }
            },
            yAxis: {
              type: 'value',
              axisLine: { lineStyle: { color: '#e0e0e0' } },
              splitLine: { lineStyle: { color: '#f0f0f0' } }
            },
            series: [
              {
                name: 'AI回复',
                data: aiData,
                type: 'bar',
                itemStyle: { color: '#1890ff' }
              },
              {
                name: 'FAQ命中',
                data: faqData,
                type: 'bar',
                itemStyle: { color: '#52c41a' }
              }
            ]
          };
          chart.setOption(option);
          consultChart = chart;
        };

        onMounted(() => {
          initUserTrendChart();
          initConsultChart();

          window.addEventListener('resize', () => {
            userTrendChart?.resize();
            consultChart?.resize();
          });
        });

        return {
          activeMenu,
          expandedMenus,
          selectedPeriod,
          menuItems,
          stats,
          periods,
          todoList,
          quickActions,
          handleMenuClick,
          handleSubMenuClick,
          handleStatClick,
          handleTodoAction,
          handleQuickAction
        };
      }
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
