<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的收藏 - 东软智慧健康咨询</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <div class="nav-back" onclick="goBack()">
                <svg viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </div>
            <div class="nav-center">
                <div class="nav-title">我的收藏</div>
            </div>
            <div class="nav-right"></div>
        </div>

        <div class="page-container" style="padding-top: 72px;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">收藏的文章</span>
                    <span class="card-subtitle">共 5 篇</span>
                </div>
                <div class="list-item" onclick="viewArticle()">
                    <div style="width: 80px; height: 60px; background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%); border-radius: 8px; flex-shrink: 0;"></div>
                    <div class="list-content" style="margin-left: 12px;">
                        <div class="list-title">春季养生指南：如何调理身体迎接春天</div>
                        <div class="list-desc">2024-01-15 · 健康知识</div>
                    </div>
                    <div class="list-arrow">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
                        </svg>
                    </div>
                </div>
                <div class="list-item" onclick="viewArticle()">
                    <div style="width: 80px; height: 60px; background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%); border-radius: 8px; flex-shrink: 0;"></div>
                    <div class="list-content" style="margin-left: 12px;">
                        <div class="list-title">高血压日常护理的十个要点</div>
                        <div class="list-desc">2024-01-12 · 疾病知识</div>
                    </div>
                    <div class="list-arrow">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
                        </svg>
                    </div>
                </div>
                <div class="list-item" onclick="viewArticle()">
                    <div style="width: 80px; height: 60px; background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%); border-radius: 8px; flex-shrink: 0;"></div>
                    <div class="list-content" style="margin-left: 12px;">
                        <div class="list-title">睡眠质量提升技巧大全</div>
                        <div class="list-desc">2024-01-10 · 健康知识</div>
                    </div>
                    <div class="list-arrow">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    <div class="toast" id="toast"></div>

    <script>
        function goBack() {
            window.location.href = 'profile.html';
        }

        function goToPage(page) {
            if (window.location.pathname.includes(page)) return;
            window.location.href = page;
        }

        function viewArticle() {
            showToast('查看文章功能开发中');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast active';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</div>
</body>
</html>
