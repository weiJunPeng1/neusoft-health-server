            <div style="display: flex; gap: 10px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px;">

                        </svg>
                    </div>
                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-size: 15px; font-weight: 500; color: #1F2329; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">春季养生：如何增强免疫力，预防常见疾病</div>

                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>

                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">

                    <div style="width: 100px; height: 80px; background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%); border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" style="width: 40px; height: 40px; fill: white;">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>

                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div style="font-size: 15px; font-weight: 500; color: #1F2329; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">睡眠质量提升技巧，告别失眠困扰</div>
                            <div style="font-size: 12px; color: #8F959E;">2024-03-13 · 养生保健 · 阅读 3.1万</div>
                        </div>
                    </div>
                </div>

                <div class="news-item" style="display: flex; gap: 12px; padding: 16px; border-bottom: 1px solid #F0F1F5; cursor: pointer;" onclick="viewNews('4')">
                    <div style="width: 100px; height: 80px; background: linear-gradient(135deg, #FF6B6B 0%, #FF4757 100%); border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" style="width: 40px; height: 40px; fill: white;">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l6.59-6.59L18 9l-8 8z"/>

                        <div>

                        </div>
                    </div>
                </div>

                <div class="news-item" style="display: flex; gap: 12px; padding: 16px; cursor: pointer;" onclick="viewNews('5')">

                            <div style="font-size: 15px; font-weight: 500; color: #1F2329; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">春季运动指南：如何科学锻炼不伤身</div>
                            <div style="font-size: 12px; color: #8F959E;">2024-03-11 · 运动健身 · 阅读 1.9万</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast提示 -->
        <div class="toast" id="toast"></div>

        <script>
            function goBack() {
                window.location.href = 'services.html';
            }

            function goToPage(page) {
                if (window.location.pathname.includes(page)) return;
                window.location.href = page;
            }

            function viewNews(id) {
                showToast('查看资讯详情功能开发中');
            }

            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('active');
                setTimeout(() => {
                    toast.classList.remove('active');
                }, 2000);
            }
        </script>
    </div>
</body>
</html>
