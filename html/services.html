<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务导航 - 东软智慧健康咨询</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
        .service-card { background: #FFF; border-radius: 16px; padding: 20px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .service-card:active { transform: scale(0.95); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .service-card .sc-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .service-card .sc-title { font-size: 15px; font-weight: 600; color: #1F2329; margin-bottom: 4px; }
        .service-card .sc-desc { font-size: 12px; color: #8F959E; line-height: 1.4; }
        .service-card .sc-badge { margin-top: 8px; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
        .service-card .sc-badge.hot { background: #FFF1F0; color: #FF4757; }
        .service-card .sc-badge.new { background: #E8F0FE; color: #4A90D9; }
        .service-card .sc-badge.vip { background: #FFF7E6; color: #FAAD14; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <div class="nav-center"><div class="nav-title">健康服务</div></div>
            <div class="nav-right"></div>
        </div>

        <div class="page-container" style="padding-top: 72px;">
            <!-- AI核心服务 -->
            <div style="padding: 0 16px; margin-bottom: 8px;">
                <div style="font-size: 13px; color: #8F959E; font-weight: 500; padding: 8px 0;">AI 核心服务</div>
            </div>
            <div class="service-grid" style="padding-top: 0;">
                <div class="service-card" onclick="goToPage('consult.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#667EEA,#764BA2);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                    </div>
                    <div class="sc-title">AI健康咨询</div>
                    <div class="sc-desc">智能对话问诊，症状分析</div>
                    <span class="sc-badge hot">热门</span>
                </div>

                <div class="service-card" onclick="goToPage('health-assistant.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#4A90D9,#357ABD);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                    <div class="sc-title">健康助手</div>
                    <div class="sc-desc">症状自查、每日健康、报告解读</div>
                    <span class="sc-badge hot">热门</span>
                </div>

                <div class="service-card" onclick="goToPage('health-report.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#FAAD14,#FFD700);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    </div>
                    <div class="sc-title">AI报告解读</div>
                    <div class="sc-desc">上传体检报告，智能分析指标</div>
                    <span class="sc-badge new">新功能</span>
                </div>

                <div class="service-card" onclick="goToPage('search.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#52C41A,#3CB371);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.77l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </div>
                    <div class="sc-title">健康搜索</div>
                    <div class="sc-desc">搜索症状、药品、健康知识</div>
                </div>
            </div>

            <!-- 会员服务 -->
            <div style="padding: 0 16px; margin-bottom: 8px;">
                <div style="font-size: 13px; color: #8F959E; font-weight: 500; padding: 8px 0;">会员与支付</div>
            </div>
            <div class="service-grid" style="padding-top: 0;">
                <div class="service-card" onclick="goToPage('member.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#FAAD14,#FFD700);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                    </div>
                    <div class="sc-title">会员中心</div>
                    <div class="sc-desc">等级权益、订阅方案、续费</div>
                    <span class="sc-badge vip">VIP</span>
                </div>

                <div class="service-card" onclick="goToPage('order.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#FF9800,#F57C00);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M11 9h2V6h3V4h-3V1h-2v3H8v2h3v3zm-4 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm14 0c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm-7-4h10V5h-3v2h-2V5H9v2H7V5H4v9h6.07c.27-2.99 1.69-5 3.93-6z"/></svg>
                    </div>
                    <div class="sc-title">我的订单</div>
                    <div class="sc-desc">订单查询、退款、支付记录</div>
                </div>

                <div class="service-card" onclick="goToPage('payment.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#1677FF,#0958D9);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                    <div class="sc-title">支付宝支付</div>
                    <div class="sc-desc">扫码支付、支付倒计时</div>
                    <span class="sc-badge new">新功能</span>
                </div>
            </div>

            <!-- 健康工具 -->
            <div style="padding: 0 16px; margin-bottom: 8px;">
                <div style="font-size: 13px; color: #8F959E; font-weight: 500; padding: 8px 0;">健康工具</div>
            </div>
            <div class="service-grid" style="padding-top: 0;">
                <div class="service-card" onclick="goToPage('health-record.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#52C41A,#3CB371);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
                    </div>
                    <div class="sc-title">健康档案</div>
                    <div class="sc-desc">血压、血糖、体温趋势追踪</div>
                </div>

                <div class="service-card" onclick="goToPage('medicine-search.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#FF6B6B,#FF4757);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M6 3h12l2 6H4l2-6zm-4 8h20v10H2V11zm14 3h-4v2h4v-2zm-6 0H6v2h4v-2z"/></svg>
                    </div>
                    <div class="sc-title">药品查询</div>
                    <div class="sc-desc">分类筛选、适应症、用法用量</div>
                    <span class="sc-badge new">新功能</span>
                </div>

                <div class="service-card" onclick="goToPage('faq.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#FF9800,#F57C00);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
                    </div>
                    <div class="sc-title">常见问题</div>
                    <div class="sc-desc">FAQ分类浏览，自助解答</div>
                </div>

                <div class="service-card" onclick="goToPage('notification.html')">
                    <div class="sc-icon" style="background:linear-gradient(135deg,#667EEA,#764BA2);">
                        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:white;"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                    </div>
                    <div class="sc-title">消息通知</div>
                    <div class="sc-desc">系统通知、会员提醒、咨询回复</div>
                </div>
            </div>

            <!-- 快速入口 -->
            <div style="padding: 0 16px; margin-bottom: 8px;">
                <div style="font-size: 13px; color: #8F959E; font-weight: 500; padding: 8px 0;">快捷入口</div>
            </div>
            <div style="display: flex; gap: 12px; padding: 0 16px 20px;">
                <div class="service-card" style="flex:1;" onclick="goToPage('consult-history.html')">
                    <div class="sc-icon" style="width:44px;height:44px;background:linear-gradient(135deg,#E8F0FE,#D0E3FC);border-radius:12px;">
                        <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:#4A90D9;"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                    </div>
                    <div class="sc-title" style="font-size:14px;">咨询历史</div>
                </div>
                <div class="service-card" style="flex:1;" onclick="goToPage('collections.html')">
                    <div class="sc-icon" style="width:44px;height:44px;background:linear-gradient(135deg,#FFF7E6,#FFE8B0);border-radius:12px;">
                        <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:#FAAD14;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div class="sc-title" style="font-size:14px;">我的收藏</div>
                </div>
                <div class="service-card" style="flex:1;" onclick="goToPage('news.html')">
                    <div class="sc-icon" style="width:44px;height:44px;background:linear-gradient(135deg,#F0FFF4,#C8F0D8);border-radius:12px;">
                        <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:#52C41A;"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
                    </div>
                    <div class="sc-title" style="font-size:14px;">健康资讯</div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="tab-bar">
            <div class="tab-item" onclick="goToPage('index.html')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="tab-item-text">首页</span>
            </div>
            <div class="tab-item active">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.66-1.6-.88l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.57.22-1.1.5-1.6.88l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.66 1.6.88l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.57-.22 1.1-.5 1.6-.88l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span class="tab-item-text">服务</span>
            </div>
            <div class="tab-item" onclick="goToPage('member.html')">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="tab-item-text">会员</span>
            </div>
            <div class="tab-item" onclick="goToPage('profile.html')">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                <span class="tab-item-text">我的</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function goToPage(page) {
            window.location.href = page;
        }
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('active');
            setTimeout(function() { t.classList.remove('active'); }, 2000);
        }
    </script>
</body>
</html>
