<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI健康助手 - 东软智慧健康咨询</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="padding-bottom: 0; display: flex; flex-direction: column; height: 100vh;">
        <!-- 顶部导航 -->
        <div class="nav-header">
            <div class="nav-back" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </div>
            <div class="nav-center">
                <div class="nav-title">AI健康助手</div>
            </div>
            <div class="nav-right">
                <div class="nav-action" onclick="clearChat()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="message-container" id="messageContainer">
            <!-- 欢迎消息 -->
            <div class="message-item ai-message">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <div class="message-content">
                    <div class="message-bubble ai">
                        <div style="font-weight: 500; margin-bottom: 8px;">您好！我是您的AI健康助手</div>
                        <div style="font-size: 13px; color: var(--text-tertiary);">
                            我可以帮助您：
                            <ul style="margin: 8px 0 0 16px; padding: 0; list-style-type: disc;">
                                <li style="margin-bottom: 4px;">分析健康数据，解读体检报告</li>
                                <li style="margin-bottom: 4px;">提供个性化健康建议</li>
                                <li style="margin-bottom: 4px;">解答常见健康问题</li>
                                <li>跟踪健康趋势，预警潜在风险</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快捷功能卡片 -->
            <div style="padding: 16px; background: var(--bg-primary); border-radius: var(--radius-lg); margin: 16px; box-shadow: var(--shadow-sm);">
                <div style="font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px;">快捷功能</div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                    <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('health_report')">
                        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                            <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                        </div>
                        <div style="font-size: 12px; color: var(--text-secondary);">健康报告</div>
                    </div>
                    <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('symptom_check')">
                        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #52C41A 0%, #3CB371 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                            <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l6.59-6.59L20 9l-8 8z"/>
                            </svg>
                        </div>
                        <div style="font-size: 12px; color: var(--text-secondary);">症状自查</div>
                    </div>
                    <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('daily_health')">
                        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #FAAD14 0%, #FFD700 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                            <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                            </svg>
                        </div>
                        <div style="font-size: 12px; color: var(--text-secondary);">每日健康</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div style="padding: 12px 16px; background: var(--bg-primary); border-top: 1px solid var(--border-light); padding-bottom: calc(12px + env(safe-area-inset-bottom));">
            <div style="display: flex; gap: 12px;">
                <input type="text" id="inputMessage" placeholder="向AI健康助手提问..." style="flex: 1; height: 44px; padding: 0 16px; border: 1px solid var(--border-color); border-radius: 22px; font-size: 14px; outline: none; transition: all 0.2s;" onkeyup="handleKeyUp(event)">
                <button class="btn btn-primary" style="width: 44px; height: 44px; padding: 0; border-radius: 50%;" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: white;">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;">
                <span class="quick-btn" onclick="sendQuickMessage('今天感觉有点头晕，怎么办？')">头晕怎么办</span>
                <span class="quick-btn" onclick="sendQuickMessage('最近睡眠不好，有什么建议？')">睡眠不好</span>
                <span class="quick-btn" onclick="sendQuickMessage('推荐一些健康食谱')">健康食谱</span>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        function sendMessage() {
            const input = document.getElementById('inputMessage');
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';

            setTimeout(() => {
                const responses = [
                    '收到您的问题，我来为您分析一下...\n\n根据您的描述，这可能是由于多种原因引起的。建议您：\n1. 保持充足的休息\n2. 注意饮食均衡\n3. 如果症状持续，请及时就医',
                    '好的，我来帮您分析。\n\n您提到的情况需要关注，以下是一些建议：\n- 定期监测相关指标\n- 遵循医生的指导\n- 保持积极的生活方式',
                    '了解了，让我为您提供一些健康建议：\n\n1. 日常保健：保持规律作息\n2. 饮食建议：多吃蔬菜水果\n3. 运动建议：适度有氧运动\n4. 心态调节：保持心情舒畅'
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage('ai', response);
            }, 1500);
        }

        function sendQuickMessage(message) {
            document.getElementById('inputMessage').value = message;
            sendMessage();
        }

        function addMessage(type, content) {
            const container = document.getElementById('messageContainer');
            const messageItem = document.createElement('div');
            messageItem.className = `message-item ${type}-message animate-fade-in`;

            if (type === 'user') {
                messageItem.innerHTML = `
                    <div class="message-content">
                        <div class="message-bubble user">${content}</div>
                    </div>
                `;
            } else {
                messageItem.innerHTML = `
                    <div class="avatar">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble ai">${content.replace(/\n/g, '<br/>')}</div>
                    </div>
                `;
            }

            container.appendChild(messageItem);
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyUp(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function quickAction(action) {
            const messages = {
                health_report: '请上传您的体检报告，我来帮您解读分析。',
                symptom_check: '请描述您的症状，我来帮您进行初步自查分析。',
                daily_health: '今天您感觉怎么样？让我为您提供今日健康建议。'
            };
            addMessage('user', messages[action]);
            setTimeout(() => {
                addMessage('ai', '正在为您分析...\n\n这是您的专属健康分析报告：\n\n✅ 身体状态：良好\n✅ 建议：保持当前健康习惯\n✅ 注意：定期体检');
            }, 1000);
        }

        function clearChat() {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `
                <div class="message-item ai-message">
                    <div class="avatar">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble ai">
                            <div style="font-weight: 500; margin-bottom: 8px;">您好！我是您的AI健康助手</div>
                            <div style="font-size: 13px; color: var(--text-tertiary);">
                                我可以帮助您：
                                <ul style="margin: 8px 0 0 16px; padding: 0; list-style-type: disc;">
                                    <li style="margin-bottom: 4px;">分析健康数据，解读体检报告</li>
                                    <li style="margin-bottom: 4px;">提供个性化健康建议</li>
                                    <li style="margin-bottom: 4px;">解答常见健康问题</li>
                                    <li>跟踪健康趋势，预警潜在风险</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="padding: 16px; background: var(--bg-primary); border-radius: var(--radius-lg); margin: 16px; box-shadow: var(--shadow-sm);">
                    <div style="font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px;">快捷功能</div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                        <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('health_report')">
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                                <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                                </svg>
                            </div>
                            <div style="font-size: 12px; color: var(--text-secondary);">健康报告</div>
                        </div>
                        <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('symptom_check')">
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #52C41A 0%, #3CB371 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                                <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l6.59-6.59L20 9l-8 8z"/>
                                </svg>
                            </div>
                            <div style="font-size: 12px; color: var(--text-secondary);">症状自查</div>
                        </div>
                        <div class="quick-action" style="display: flex; flex-direction: column; align-items: center; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer;" onclick="quickAction('daily_health')">
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #FAAD14 0%, #FFD700 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                                <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: white;">
                                    <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                                </svg>
                            </div>
                            <div style="font-size: 12px; color: var(--text-secondary);">每日健康</div>
                        </div>
                    </div>
                </div>
            `;
            showToast('已清空对话');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        }
    </script>
</body>
</html>
