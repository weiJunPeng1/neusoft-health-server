<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心 - 东软智慧健康咨询</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <div class="nav-back" onclick="goBack()">
                <svg viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </div>
            <div class="nav-center">
                <div class="nav-title">消息中心</div>
            </div>
            <div class="nav-right"></div>
        </div>

        <div class="page-container" style="padding-top: 72px;">
            <div class="list-item" onclick="viewMessage('system')">
                <div class="list-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <div class="list-content">
                    <div class="list-title">系统通知</div>
                    <div class="list-desc">您的会员权益已更新</div>
                </div>
                <div class="badge">2</div>
            </div>
            <div class="list-item" onclick="viewMessage('consult')">
                <div class="list-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1.02 1.02 0 0 0-1.02.27l-2.2 2.2a15.045 15.045 0 0 1-6.16-6.16l2.2-2.21a.96.96 0 0 0 .27-1.02A11.36 11.36 0 0 1 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1zM12 14c-.55 0-1-.45-1-1V9c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1z"/>
                    </svg>
                </div>
                <div class="list-content">
                    <div class="list-title">问诊回复</div>
                    <div class="list-desc">AI助手已回复您的咨询</div>
                </div>
                <div class="badge">1</div>
            </div>
            <div class="list-item" onclick="viewMessage('promotion')">
                <div class="list-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
                <div class="list-content">
                    <div class="list-title">优惠活动</div>
                    <div class="list-desc">新会员专享8折优惠</div>
                </div>
                <div class="list-arrow">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
                    </svg>
                </div>
            </div>
        </div>

    <script>
        function goBack() {
            window.location.href = 'profile.html';
        }

        function goToPage(page) {
            if (window.location.pathname.includes(page)) return;
            window.location.href = page;
        }

        function viewMessage(type) {
            showToast('查看消息功能开发中');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast active';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</div>
</body>
</html>
