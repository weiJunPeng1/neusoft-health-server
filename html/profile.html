    <!-- 编辑信息弹窗 -->
    <div class="modal-mask" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">编辑个人信息</div>
                <div class="modal-desc">修改您的个人资料</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input class="form-input" type="text" placeholder="请输入昵称" value="健康用户">
                </div>
                <div class="form-group">
                    <label class="form-label">性别</label>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-outline" style="flex: 1;">男</button>
                        <button class="btn btn-primary" style="flex: 1;">女</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">年龄</label>
                    <input class="form-input" type="number" placeholder="请输入年龄" value="30">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        function goToPage(page) {
            if (window.location.pathname.includes(page)) return;
            window.location.href = page;
        }

        function showEditModal() {
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveEdit() {
            showToast('修改成功');
            closeEditModal();
        }

        function showShare() {
            showToast('分享功能开发中');
        }

        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                showToast('退出成功');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2000);
        }
    </script>
</body>
</html>
